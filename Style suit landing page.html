<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Styling Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #F8F4EF;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }
  .wrap { text-align: center; padding: 40px 24px; }
  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #B4A99A;
    margin-bottom: 28px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    font-style: italic;
    color: #1A1714;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  .divider {
    width: 40px;
    height: 0.5px;
    background: #C9C2B6;
    margin: 0 auto 20px;
  }
  .sub {
    font-size: 13px;
    color: #8C8379;
    letter-spacing: 0.08em;
    line-height: 1.8;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #C9C2B6;
    margin: 36px auto 0;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Personal styling · Color · Wardrobe</div>
    <h1 class="title">The Styling<br>Suite</h1>
    <div class="divider"></div>
    <p class="sub">Something beautiful is on its way.<br>A personalized styling experience, coming soon.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
